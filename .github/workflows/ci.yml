name: CI

on:
  push:
    branches: [main, 'bootstrap/**', 'feat/**', 'fix/**', 'chore/**']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm run build
        env:
          SKIP_ENV_VALIDATION: true
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-secret-not-real
          DATABASE_URL: postgresql://user:pass@localhost:5432/ci
          STRIPE_SECRET_KEY: sk_test_ci
          STRIPE_WEBHOOK_SECRET: whsec_ci
          WORKER_URL: http://localhost:8000
          WORKER_SECRET: ci-worker-secret
          ENCRYPTION_KEY: bV4UmliwP4xFApJTnq5O5XxJ4mltOC4bjrQQ7EdCUtc=
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  e2e-journey:
    name: E2E journey
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U ci" --health-interval 10s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-secret-not-real
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # Real Stripe TEST key for test-mode checkout; falls back to a dummy if the
      # secret isn't set (the test self-skips). Webhook secret stays a fixed CI
      # value so the signed-event test can sign + verify consistently.
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE || 'sk_test_ci' }}
      STRIPE_WEBHOOK_SECRET: whsec_ci
      # Resend inbound signing secret (whsec_…) for the signed inbound test.
      RESEND_WEBHOOK_SECRET: ${{ secrets.REBOUND }}
      WORKER_URL: http://localhost:8000
      WORKER_SECRET: ci-worker-secret
      ENCRYPTION_KEY: bV4UmliwP4xFApJTnq5O5XxJ4mltOC4bjrQQ7EdCUtc=
      GOOGLE_CLIENT_ID: ci
      GOOGLE_CLIENT_SECRET: ci
      GITHUB_ID: ci
      GITHUB_SECRET: ci
      # Skip the local webServer; we start the built app ourselves below.
      PLAYWRIGHT_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run build
        env:
          SKIP_ENV_VALIDATION: true
      - run: npx playwright install --with-deps chromium
      - name: Start app
        run: |
          npm start &
          timeout 90 bash -c 'until curl -sf http://localhost:3000 >/dev/null; do sleep 2; done'
      - name: Run journey + sign-in regression specs
        run: npx playwright test --project=chromium e2e/journey.spec.ts e2e/journey-authed.spec.ts e2e/journey-payment-inbox.spec.ts e2e/auth-signin-retry.spec.ts e2e/example.spec.ts
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  cyrillic-guard:
    name: No Cyrillic in source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check for Cyrillic characters
        run: |
          MATCHES=$(grep -rIl \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.py' \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=docs \
            -P '[\x{0400}-\x{04FF}]' app components lib prisma worker 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "Cyrillic characters found in source files:"
            echo "$MATCHES"
            exit 1
          fi
          echo "No Cyrillic found"
