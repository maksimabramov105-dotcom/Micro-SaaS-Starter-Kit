name: CI

on:
  push:
    branches: [main, 'bootstrap/**', 'feat/**', 'fix/**', 'chore/**']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm run build
        env:
          SKIP_ENV_VALIDATION: true
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-secret-not-real
          DATABASE_URL: postgresql://user:pass@localhost:5432/ci
          STRIPE_SECRET_KEY: sk_test_ci
          STRIPE_WEBHOOK_SECRET: whsec_ci
          WORKER_URL: http://localhost:8000
          WORKER_SECRET: ci-worker-secret
          ENCRYPTION_KEY: bV4UmliwP4xFApJTnq5O5XxJ4mltOC4bjrQQ7EdCUtc=
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  cyrillic-guard:
    name: No Cyrillic in source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for Cyrillic characters
        run: |
          MATCHES=$(grep -rIl \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.py' \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=docs \
            -P '[\x{0400}-\x{04FF}]' app components lib prisma worker 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "Cyrillic characters found in source files:"
            echo "$MATCHES"
            exit 1
          fi
          echo "No Cyrillic found"
