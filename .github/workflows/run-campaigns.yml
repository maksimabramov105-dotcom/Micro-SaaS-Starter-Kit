name: Run autoapply campaigns

on:
  schedule:
    # Every 30 min (~4x the old 2h cadence) to raise total daily throughput.
    # Safe because run-campaigns takes a Redis SETNX lock, so an overlapping fire
    # while a run is still in flight is skipped rather than double-applying.
    - cron: '*/30 * * * *'
  workflow_dispatch:         # manual trigger for testing

jobs:
  run:
    name: Trigger campaign runner
    runs-on: ubuntu-latest
    steps:
      - name: Call run-campaigns cron endpoint
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/body.txt -w "%{http_code}" \
            -X POST "https://resumeai-bot.ru/api/cron/run-campaigns" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 600)
          BODY=$(cat /tmp/body.txt)
          echo "Status  : $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error::Campaign runner returned HTTP $HTTP_STATUS: $BODY"
            exit 1
          fi
          # The endpoint schedules the apply loop in the background (Next after())
          # and returns 200 immediately, so the actual applied/failed counts are
          # NOT in this response — they land in the web/worker logs once the
          # background run finishes. This step only confirms the run was accepted.
          echo "Campaign run scheduled (results appear in web/worker logs)."
