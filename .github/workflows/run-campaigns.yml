name: Run autoapply campaigns

on:
  schedule:
    - cron: '0 */2 * * *'  # every 2 hours UTC
  workflow_dispatch:         # manual trigger for testing

jobs:
  run:
    name: Trigger campaign runner
    runs-on: ubuntu-latest
    steps:
      - name: Call run-campaigns cron endpoint
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/body.txt -w "%{http_code}" \
            -X POST "https://resumeai-bot.ru/api/cron/run-campaigns" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 600)
          BODY=$(cat /tmp/body.txt)
          echo "Status  : $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error::Campaign runner returned HTTP $HTTP_STATUS: $BODY"
            exit 1
          fi
          # Print summary fields for easy reading in Actions log
          echo "$BODY" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          print(f\"Applied : {d.get('totalApplied', 0)}\")
          print(f\"Failed  : {d.get('totalFailed', 0)}\")
          print(f\"Skipped : {d.get('totalSkipped', 0)}\")
          print(f\"Campaigns: {d.get('campaigns', 0)}\")
          " 2>/dev/null || true
