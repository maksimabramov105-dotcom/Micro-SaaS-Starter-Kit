name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false   # never cancel a running deploy

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  # ── 1. Quality gate ──────────────────────────────────────────────────────────
  test:
    name: Test & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type-check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:ci

      - name: Prisma schema validate
        # No real DB needed — just checks schema syntax
        run: |
          DATABASE_URL=postgresql://x:x@localhost:5432/x \
          npx prisma validate

      - name: Next.js build check
        # Runs next build outside Docker — errors appear here in plain text.
        # Mirrors exactly what the Dockerfile does (same NODE_OPTIONS).
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          NODE_OPTIONS: '--max-old-space-size=3500'
          # Stub required build-time vars so Next.js / Sentry don't abort
          NEXT_PUBLIC_APP_URL: 'https://resumeai-bot.ru'
          NEXT_PUBLIC_APP_NAME: 'ResumeAI'
        run: npm run build

  # ── 2. Build & push images to GHCR ──────────────────────────────────────────
  build:
    name: Build & push Docker images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── web image ─────────────────────────────────────────────────────────
      - name: Build & push web
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/resumeai-web:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/resumeai-web:latest
          cache-from: type=gha,scope=web
          cache-to:   type=gha,scope=web,mode=max

      # ── worker image ──────────────────────────────────────────────────────
      - name: Build & push worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/resumeai-worker:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/resumeai-worker:latest
          cache-from: type=gha,scope=worker
          cache-to:   type=gha,scope=worker,mode=max

  # ── 3. Deploy to VPS ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      packages: read   # allows github.token to pull images from GHCR on VPS
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        env:
          # Use the job's github.token for GHCR pull on VPS — no custom PAT needed.
          GHCR_TOKEN: ${{ github.token }}
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          envs: GITHUB_SHA,GHCR_TOKEN
          script: |
            export IMAGE_TAG="${GITHUB_SHA}"
            export OWNER="${{ env.OWNER }}"

            # ── Auth ────────────────────────────────────────────────────────────
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${OWNER}" --password-stdin

            # ── Free ports 80/443 — Caddy needs them ────────────────────────────
            systemctl stop nginx 2>/dev/null || true
            systemctl disable nginx 2>/dev/null || true

            # ── Sync deploy.sh from CI (always latest, never stale) ─────────────
            mkdir -p /opt/resumeai/scripts
            cat > /opt/resumeai/scripts/deploy.sh << 'DEPLOY_EOF'
            #!/usr/bin/env bash
            set -euo pipefail
            DEPLOY_DIR="${DEPLOY_DIR:-/opt/resumeai}"
            REGISTRY="ghcr.io"
            IMAGE_TAG="${IMAGE_TAG:-latest}"
            OWNER="${OWNER:-maksimabramov105-dotcom}"
            WEB_IMAGE="${REGISTRY}/${OWNER}/resumeai-web:${IMAGE_TAG}"
            WORKER_IMAGE="${REGISTRY}/${OWNER}/resumeai-worker:${IMAGE_TAG}"
            log() { echo "[$(date -u +%T)] $*"; }
            log "Deploying tag=${IMAGE_TAG}"
            cd "$DEPLOY_DIR"

            # ── Disk guard: fail fast if <2 GB free before pull ─────────────────
            AVAIL_KB=$(df / | awk 'NR==2 {print $4}')
            AVAIL_GB=$(echo "scale=1; ${AVAIL_KB}/1048576" | bc)
            log "Disk: ${AVAIL_GB}G free before pull"
            if [ "${AVAIL_KB}" -lt 2097152 ]; then
              log "ERROR: less than 2 GB free (${AVAIL_GB}G). Pruning unused images first..."
              docker image prune -f
              AVAIL_KB=$(df / | awk 'NR==2 {print $4}')
              AVAIL_GB=$(echo "scale=1; ${AVAIL_KB}/1048576" | bc)
              log "Disk after prune: ${AVAIL_GB}G free"
              if [ "${AVAIL_KB}" -lt 2097152 ]; then
                log "FATAL: still less than 2 GB free after prune. Aborting deploy."
                exit 1
              fi
            fi

            log "Pulling images..."
            WEB_IMAGE="$WEB_IMAGE" WORKER_IMAGE="$WORKER_IMAGE" docker compose pull web worker
            log "Restarting services..."
            WEB_IMAGE="$WEB_IMAGE" WORKER_IMAGE="$WORKER_IMAGE" docker compose up -d --remove-orphans --no-build
            log "Running Prisma migrations..."
            docker compose exec -T web node node_modules/prisma/build/index.js migrate deploy
            log "Waiting 15s for services to stabilise..."
            sleep 15
            log "Running smoke tests..."
            bash "${DEPLOY_DIR}/scripts/smoke_test.sh"
            # ── Post-deploy cleanup: remove images from previous deploys ────────
            log "Pruning dangling/old images to reclaim disk..."
            docker image prune -f
            AVAIL_KB=$(df / | awk 'NR==2 {print $4}')
            AVAIL_GB=$(echo "scale=1; ${AVAIL_KB}/1048576" | bc)
            log "Disk after cleanup: ${AVAIL_GB}G free"

            log "Deploy complete — tag=${IMAGE_TAG}"
            DEPLOY_EOF
            chmod +x /opt/resumeai/scripts/deploy.sh

            bash /opt/resumeai/scripts/deploy.sh

      - name: Notify success
        if: success()
        run: |
          echo "✅ Deployed ${{ github.sha }} to production"
