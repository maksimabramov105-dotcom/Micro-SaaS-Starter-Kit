name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false   # never cancel a running deploy

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  # ── 1. Quality gate ──────────────────────────────────────────────────────────
  test:
    name: Test & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type-check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:ci

      - name: Prisma schema validate
        # No real DB needed — just checks schema syntax
        run: |
          DATABASE_URL=postgresql://x:x@localhost:5432/x \
          npx prisma validate

  # ── 2. Build & push images to GHCR ──────────────────────────────────────────
  build:
    name: Build & push Docker images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── web image ─────────────────────────────────────────────────────────
      - name: Build & push web
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/resumeai-web:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/resumeai-web:latest
          cache-from: type=gha,scope=web
          cache-to:   type=gha,scope=web,mode=max

      # ── worker image ──────────────────────────────────────────────────────
      - name: Build & push worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/resumeai-worker:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/resumeai-worker:latest
          cache-from: type=gha,scope=worker
          cache-to:   type=gha,scope=worker,mode=max

  # ── 3. Deploy to VPS ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        env:
          # Expose GHCR_TOKEN to the remote shell so deploy.sh can docker-login
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          envs: GITHUB_SHA,GHCR_TOKEN
          script: |
            export IMAGE_TAG="${GITHUB_SHA}"
            export OWNER="${{ env.OWNER }}"

            # ── Auth ────────────────────────────────────────────────────────────
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${OWNER}" --password-stdin

            # ── Free ports 80/443 — Caddy needs them ────────────────────────────
            systemctl stop nginx 2>/dev/null || true
            systemctl disable nginx 2>/dev/null || true

            # ── Sync deploy.sh from CI (always latest, never stale) ─────────────
            mkdir -p /opt/resumeai/scripts
            cat > /opt/resumeai/scripts/deploy.sh << 'DEPLOY_EOF'
            #!/usr/bin/env bash
            set -euo pipefail
            DEPLOY_DIR="${DEPLOY_DIR:-/opt/resumeai}"
            REGISTRY="ghcr.io"
            IMAGE_TAG="${IMAGE_TAG:-latest}"
            OWNER="${OWNER:-maksimabramov105-dotcom}"
            WEB_IMAGE="${REGISTRY}/${OWNER}/resumeai-web:${IMAGE_TAG}"
            WORKER_IMAGE="${REGISTRY}/${OWNER}/resumeai-worker:${IMAGE_TAG}"
            log() { echo "[$(date -u +%T)] $*"; }
            log "Deploying tag=${IMAGE_TAG}"
            cd "$DEPLOY_DIR"
            log "Pulling images..."
            WEB_IMAGE="$WEB_IMAGE" WORKER_IMAGE="$WORKER_IMAGE" docker compose pull web worker
            log "Restarting services..."
            WEB_IMAGE="$WEB_IMAGE" WORKER_IMAGE="$WORKER_IMAGE" docker compose up -d --remove-orphans --no-build
            log "Running Prisma migrations..."
            docker compose exec -T web ./node_modules/.bin/prisma migrate deploy
            log "Waiting 15s for services to stabilise..."
            sleep 15
            log "Running smoke tests..."
            bash "${DEPLOY_DIR}/scripts/smoke_test.sh"
            log "Deploy complete — tag=${IMAGE_TAG}"
            DEPLOY_EOF
            chmod +x /opt/resumeai/scripts/deploy.sh

            bash /opt/resumeai/scripts/deploy.sh

      - name: Notify success
        if: success()
        run: |
          echo "✅ Deployed ${{ github.sha }} to production"
